<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Downloader Pro</title>
    <meta name="description" content="Download YouTube videos, MP3 audio, and Instagram reels with Media Downloader Pro">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </div>
            <div class="header-text">
                <h1>Media Downloader Pro</h1>
                <span class="version-badge" id="versionBadge">v2.0</span>
            </div>
        </div>

        <!-- Platform Tabs -->
        <div class="platform-tabs" id="platformTabs">
            <button class="platform-tab active" data-platform="youtube" onclick="selectPlatform('youtube')">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                YouTube
            </button>
            <button class="platform-tab" data-platform="instagram" onclick="selectPlatform('instagram')">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
                </svg>
                Instagram
            </button>
        </div>

        <!-- URL Input Card -->
        <div class="card" id="inputCard">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
                <button id="fetchBtn" class="btn-primary" onclick="fetchInfo()">
                    <span class="btn-text">Analyze</span>
                    <div class="spinner" id="fetchSpinner"></div>
                </button>
            </div>
            
            <div class="settings-group">
                <div class="folder-picker">
                    <label>Save to:</label>
                    <div class="folder-display">
                        <span id="folderPathText">Default (Downloads Folder)</span>
                        <button class="btn-secondary" onclick="chooseFolder()">Browse</button>
                    </div>
                </div>
                
                <label class="toggle-container" id="chapterToggle">
                    <input type="checkbox" id="splitChapters">
                    <span class="toggle-switch"></span>
                    Split into audio chapters
                </label>
                
                <label class="toggle-container" id="trimToggle" style="display: none;">
                    <input type="checkbox" id="enableTrim" onchange="toggleTrimmerUI()">
                    <span class="toggle-switch"></span>
                    Trim Media
                </label>
            </div>
        </div>

        <!-- Trimmer UI -->
        <div class="card trimmer-ui" id="trimmerUI" style="display: none;">
            <div class="trimmer-preview">
                <div id="ytPlayerContainer"></div>
            </div>
            
            <div class="timeline-container">
                <div class="timeline-track" id="timelineTrack"></div>
                <input type="range" class="timeline-thumb thumb-start" id="timelineStart" min="0" max="100" value="0" oninput="onTimelineDrag('start')">
                <input type="range" class="timeline-thumb thumb-end" id="timelineEnd" min="0" max="100" value="100" oninput="onTimelineDrag('end')">
                <input type="range" class="timeline-thumb thumb-playhead" id="timelinePlayhead" min="0" max="100" value="0" oninput="onPlayheadDrag()" onmousedown="onPlayheadGrab()" onmouseup="onPlayheadRelease()">
            </div>

            <div class="trimmer-controls">
                <div class="trim-input-group">
                    <label>Start (sec)</label>
                    <div class="trim-input-row">
                        <input type="number" id="trimStart" placeholder="0" min="0" step="1" oninput="onManualTimeInput()">
                        <button class="btn-secondary btn-sm" onclick="setTrimTime('start')">Set to Current</button>
                    </div>
                </div>
                <div class="trim-input-group">
                    <label>End (sec)</label>
                    <div class="trim-input-row">
                        <input type="number" id="trimEnd" placeholder="End" min="0" step="1" oninput="onManualTimeInput()">
                        <button class="btn-secondary btn-sm" onclick="setTrimTime('end')">Set to Current</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Media Info Preview -->
        <div id="mediaPreview" class="card media-preview" style="display: none;">
            <div class="media-preview-content">
                <img id="mediaThumbnail" class="media-thumbnail" src="" alt="">
                <div class="media-meta">
                    <h3 id="mediaTitle" class="media-title"></h3>
                    <span id="mediaChannel" class="media-channel"></span>
                </div>
            </div>
        </div>

        <!-- YouTube Results -->
        <div id="resultsArea" style="display: none;">
            <div class="tabs" id="tabsGroup">
                <button class="tab active" onclick="switchTab('video')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                        <line x1="7" y1="2" x2="7" y2="22"></line>
                        <line x1="17" y1="2" x2="17" y2="22"></line>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <line x1="2" y1="7" x2="7" y2="7"></line>
                        <line x1="2" y1="17" x2="7" y2="17"></line>
                        <line x1="17" y1="7" x2="22" y2="7"></line>
                        <line x1="17" y1="17" x2="22" y2="17"></line>
                    </svg>
                    MP4 Video
                </button>
                <button class="tab" onclick="switchTab('audio')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                    MP3 Audio
                </button>
            </div>

            <div class="content-area card">
                <div id="videoFormats" class="format-list" style="display: none;"></div>
                <div id="audioFormats" class="format-list" style="display: none;"></div>
            </div>
        </div>

        <!-- Instagram Results -->
        <div id="instagramResults" style="display: none;">
            <div class="content-area card">
                <div id="instaMediaList" class="format-list"></div>
            </div>
        </div>
        
        <!-- Download Status -->
        <div class="download-status card" id="downloadStatus" style="display: none;">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">Downloading: 0%</div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>Built with ❤ by <a href="#" onclick="pywebview.api.open_link('https://github.com/Shreyas445/Media-Downloader-Pro'); return false;" class="footer-link">Shreyas445</a></span>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
